apiVersion: apps/v1
kind: Deployment
metadata:
  name: spring-petclinic
  namespace: spring-petclinic

spec:
  replicas: 2

  selector:
    matchLabels:
      app: spring-petclinic

  template:
    metadata:
      labels:
        app: spring-petclinic

    spec:
      containers:
      - name: spring-petclinic

        image: kkaluri123/spring-petclinic:v1

        imagePullPolicy: Always

        ports:
        - containerPort: 8080
